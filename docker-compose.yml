# Docker compose for postgres, redis, kv_store_ms and id_generator_ms

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    volumes:
      - ./pg-data:/var/lib/postgresql/data
    ports:
      - 5432:5432
    restart: always

  kv_store:
    image: redis:7.2-alpine
    container_name: kv_store
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - ./redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --bind 0.0.0.0
      --protected-mode no

  kv_store_ms:
    build: /src/kv_store/.
    restart: always
    ports:
      - "5001:5001"
    depends_on:
      - kv_store

  id_generator_ms:
    build: /src/id_generator/.
    restart: always
    ports:
      - "5002:5002"
    depends_on:
      - postgres

  coordinator_ms:
    build: /src/coordinator/.
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - kv_store_ms
      - id_generator_ms

  chat_server_0:
    build: /src/chat_server/.
    restart: always
    ports:
      - "5003:5003"
    depends_on:
      - kv_store_ms
      - id_generator_ms
