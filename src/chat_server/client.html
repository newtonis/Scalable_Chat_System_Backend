<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WebSocket Client</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      background: #1e293b;
      border-radius: 12px;
      width: 100%;
      max-width: 600px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .header {
      padding: 20px 24px;
      background: #0f172a;
      border-bottom: 1px solid #334155;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .status-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #ef4444;
      transition: background 0.3s;
    }
    .status-dot.connected { background: #22c55e; animation: pulse 1.5s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .header h1 { font-size: 1rem; font-weight: 600; }
    .header span { font-size: 0.8rem; color: #64748b; margin-left: auto; }

    #log {
      height: 340px;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .msg {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.85rem;
      line-height: 1.4;
      max-width: 85%;
      word-break: break-word;
    }
    .msg.enviado   { background: #3b82f6; align-self: flex-end; }
    .msg.recibido  { background: #334155; align-self: flex-start; }
    .msg.broadcast { background: #7c3aed; align-self: flex-start; }
    .msg.sistema   { background: #064e3b; color: #6ee7b7; align-self: center;
                     font-size: 0.75rem; padding: 6px 12px; }

    .msg .meta { font-size: 0.7rem; opacity: 0.6; margin-top: 4px; }

    .input-area {
      padding: 16px;
      border-top: 1px solid #334155;
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 10px 14px;
      color: #e2e8f0;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #3b82f6; }

    button {
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      transition: background 0.2s;
    }
    button:hover { background: #2563eb; }
    button:disabled { background: #334155; cursor: not-allowed; }

    .actions {
      padding: 0 16px 16px;
      display: flex;
      gap: 8px;
    }
    .actions button {
      flex: 1;
      font-size: 0.8rem;
      padding: 8px;
      background: #334155;
    }
    .actions button:hover { background: #475569; }
    #btnDesconectar { background: #7f1d1d; }
    #btnDesconectar:hover { background: #991b1b; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="status-dot" id="dot"></div>
    <h1>WebSocket Client</h1>
    <span id="statusText">Desconectado</span>
  </div>

  <div id="log"></div>

  <div class="input-area">
    <input id="msgInput" type="text" placeholder="Escribí un mensaje..." disabled />
    <button id="btnEnviar" disabled>Enviar</button>
  </div>

  <div class="actions">
    <button id="btnConectar">Conectar</button>
    <button id="btnDesconectar" disabled>Desconectar</button>
  </div>
</div>

<script>
  const WS_URL = "ws://localhost:8765";
  let ws = null;

  const log       = document.getElementById("log");
  const msgInput  = document.getElementById("msgInput");
  const btnEnviar = document.getElementById("btnEnviar");
  const btnConectar    = document.getElementById("btnConectar");
  const btnDesconectar = document.getElementById("btnDesconectar");
  const dot        = document.getElementById("dot");
  const statusText = document.getElementById("statusText");

  function addMsg(texto, tipo, meta = "") {
    const div = document.createElement("div");
    div.className = `msg ${tipo}`;
    div.innerHTML = `${texto}${meta ? `<div class="meta">${meta}</div>` : ""}`;
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
  }

  function setConnected(connected) {
    dot.className = "status-dot" + (connected ? " connected" : "");
    statusText.textContent = connected ? "Conectado" : "Desconectado";
    msgInput.disabled = !connected;
    btnEnviar.disabled = !connected;
    btnConectar.disabled = connected;
    btnDesconectar.disabled = !connected;
  }

  btnConectar.addEventListener("click", () => {
    ws = new WebSocket(WS_URL);

    ws.onopen = () => {
      setConnected(true);
      addMsg("✅ Conectado al servidor", "sistema");
    };

    ws.onmessage = (event) => {
      const data = JSON.parse(event.data);
      if (data.tipo === "respuesta") {
        addMsg(data.mensaje, "recibido", data.timestamp);
      } else if (data.tipo === "broadcast") {
        addMsg(`📢 ${data.de}: ${data.mensaje}`, "broadcast", data.timestamp);
      }
    };

    ws.onclose = () => {
      setConnected(false);
      addMsg("🔌 Desconectado del servidor", "sistema");
    };

    ws.onerror = () => {
      addMsg("❌ Error de conexión", "sistema");
    };
  });

  btnDesconectar.addEventListener("click", () => {
    ws && ws.close();
  });

  function enviarMensaje() {
    const texto = msgInput.value.trim();
    if (!texto || !ws) return;
    ws.send(JSON.stringify({ texto }));
    addMsg(texto, "enviado");
    msgInput.value = "";
  }

  btnEnviar.addEventListener("click", enviarMensaje);
  msgInput.addEventListener("keydown", e => e.key === "Enter" && enviarMensaje());
</script>
</body>
</html>
