services:  
  kv_store:
    image: redis:7.2-alpine
    container_name: kv_store
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - ./redis_data:/data
    # Aquí configuramos la persistencia AOF (tipo WAL) y el límite de RAM directo por comandos
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --bind 0.0.0.0
      --protected-mode no
